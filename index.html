<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boda de Angel &amp; Clara — Próximamente</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Lato:wght@300;400&family=Pinyon+Script&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #faf8f5;
      font-family: "Lato", sans-serif;
      color: #2d3a29;
      text-align: center;
      padding: 2rem;
    }

    .card {
      max-width: 480px;
      width: 100%;
      background: rgba(255,255,255,0.85);
      border: 1px solid rgba(168,127,59,0.25);
      border-radius: 1.5rem;
      padding: 3rem 2.5rem;
      box-shadow: 0 10px 40px rgba(0,0,0,0.07), 0 2px 10px rgba(168,127,59,0.08);
    }

    .ornament {
      color: #a87f3b;
      font-size: 1.4rem;
      letter-spacing: 0.4em;
      margin-bottom: 1.5rem;
      opacity: 0.6;
    }

    .names {
      font-family: "Pinyon Script", cursive;
      font-size: clamp(2.8rem, 8vw, 3.8rem);
      color: #a87f3b;
      line-height: 1.1;
      margin-bottom: 1.5rem;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #a87f3b, transparent);
      margin: 0 auto 1.5rem;
    }

    .label {
      font-family: "Playfair Display", serif;
      font-style: italic;
      font-size: 1rem;
      color: #a87f3b;
      letter-spacing: 0.05em;
      margin-bottom: 0.75rem;
    }

    .message {
      font-size: 0.95rem;
      color: #535e4d;
      line-height: 1.8;
      font-weight: 300;
    }
  </style>
</head>
<body>
  <div class="card">
    <p class="ornament">— ✦ —</p>
    <p class="names">Angel &amp; Clara</p>
    <div class="divider"></div>
    <p class="label">Sitio en mantenimiento</p>
    <p class="message">Estamos realizando algunos ajustes.<br>Volvemos muy pronto.</p>
  </div>
</body>
</html>
